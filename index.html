<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#101827" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="UDS Dev Log" />
<title>UDS Development Log v2.1</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css?v=2.1" />
</head>
<body>
<header>
  <h1>UDS Development Log</h1>
  <p id="syncStatus">v2.1 • fixed navigation • offline ready</p>
</header>

<nav>
  <button data-tab="dashboard" class="active">Home</button>
  <button data-tab="entry">Entry</button>
  <button data-tab="actions">Actions</button>
  <button data-tab="report">Report</button>
  <button data-tab="settings">Settings</button>
</nav>

<main>
<section id="dashboard" class="tab active">
<h2>Today</h2>
<div class="tiles">
<div><b id="tileHeadings">0</b><span>Headings</span></div>
<div><b id="tileMetres">0.0</b><span>Metres</span></div>
<div><b id="tileBolts">0</b><span>Bolts</span></div>
<div><b id="tileShotcrete">0.0</b><span>Shotcrete m³</span></div>
<div><b id="tileActions">0</b><span>Open Actions</span></div>
<div><b id="tileSafety">0</b><span>Safety Obs.</span></div>
</div>

<h2>Quick Actions</h2>
<div class="quick">
<button type="button" data-go="entry">+ Development Entry</button>
<button type="button" data-go="actions" class="secondary">+ Action</button>
<button type="button" data-go="report" class="secondary">Daily Report</button>
<button type="button" onclick="syncAll()" class="success">Sync Now</button>
</div>

<h2>Recent Entries</h2>
<div id="recentLogs"></div>
</section>

<section id="entry" class="tab">
<h2>New Development Entry</h2>
<label>Date<input id="date" type="date"></label>
<label>Time<input id="time" type="time"></label>
<label>Shift<select id="shift"><option>DS</option><option>NS</option></select></label>
<label>Heading / Drive<input id="heading" placeholder="Type heading, e.g. EXL XD44 DN31"></label>
<label>Level / Area<input id="levelArea" placeholder="Extraction Level / Panel 2"></label>

<div class="grid">
<label>Crew<input id="crew" placeholder="Crew name / number"></label>
<label>Supervisor<input id="supervisor" placeholder="Supervisor name"></label>
<label>Foreman<input id="foreman" placeholder="Foreman name"></label>
<label>Personnel<input id="personnel" type="number" placeholder="0"></label>
</div>

<label>Activity<select id="activity">
<option>Bolting</option><option>Screening / Mesh</option><option>Shotcrete</option><option>Scaling</option>
<option>Face Drilling</option><option>Charging</option><option>Blasting</option><option>Mucking</option>
<option>Services Install</option><option>Vent Install</option><option>Cable Bolting</option><option>Rehab</option>
<option>Roadway Cleanup</option><option>Ground Support QA/QC</option><option>Survey</option><option>Other</option>
</select></label>

<label>Round Number / Chainage<input id="roundChainage" placeholder="Round 24 / CH 156.5"></label>

<div class="grid">
<label>Metres Advanced<input id="metresAdvanced" type="number" step="0.1"></label>
<label>Bolts Installed<input id="boltsInstalled" type="number"></label>
<label>Cable Bolts<input id="cableBolts" type="number"></label>
<label>Mesh Installed<input id="meshInstalled" placeholder="4 sheets / complete"></label>
<label>Shotcrete m³<input id="shotcreteM3" type="number" step="0.1"></label>
<label>Shotcrete Thickness<input id="shotcreteThickness" placeholder="75mm"></label>
</div>

<label>Equipment Used<textarea id="equipment" placeholder="Bolter, Spraymec, Jumbo, Loader, Truck..."></textarea></label>

<label>Ground Condition<select id="groundCondition">
<option>Good</option><option>Fair</option><option>Poor</option><option>Wet</option>
<option>Loose / Scaling Required</option><option>Overbreak</option><option>Other</option>
</select></label>

<label>Delay Type<select id="delayType">
<option>None</option><option>Waiting on Equipment</option><option>Equipment Breakdown</option>
<option>Waiting on Services</option><option>Waiting on Survey</option><option>Waiting on Ventilation</option>
<option>Ground Conditions</option><option>Material Shortage</option><option>Access Restriction</option><option>Other</option>
</select></label>

<label>Delay Hours<input id="delayHours" type="number" step="0.25"></label>
<label>Job Being Performed<textarea id="job"></textarea></label>
<label>Delays / Constraints<textarea id="delays"></textarea></label>
<label>Next Shift Plan<textarea id="nextShift"></textarea></label>

<h3>Safety / Quality Checks</h3>
<div class="checks">
<label><input type="checkbox" id="ptha"> PTHA</label>
<label><input type="checkbox" id="lif"> LIF</label>
<label><input type="checkbox" id="scaled"> Scaling Complete</label>
<label><input type="checkbox" id="groundSupport"> Ground Support Complete</label>
<label><input type="checkbox" id="boltPattern"> Bolt Pattern Verified</label>
<label><input type="checkbox" id="shotcreteQuality"> Shotcrete Quality Checked</label>
<label><input type="checkbox" id="ventilation"> Ventilation Adequate</label>
<label><input type="checkbox" id="servicesClear"> Services Clear</label>
<label><input type="checkbox" id="barricades"> Barricades / Controls</label>
<label><input type="checkbox" id="reentry"> Re-entry Confirmed</label>
</div>

<label>Safety Observation<textarea id="safetyObservation"></textarea></label>
<label>Good Catch / Improvement<textarea id="goodCatch"></textarea></label>
<label>General Notes<textarea id="notes"></textarea></label>
<label>Photos<input id="photos" type="file" accept="image/*" capture="environment" multiple></label>
<div id="photoPreview" class="photos"></div>
<button type="button" onclick="saveEntry()">Save Entry</button>
</section>

<section id="actions" class="tab">
<h2>Action Register</h2>
<label>Related Heading<input id="actionHeading"></label>
<label>Action Required<input id="actionText"></label>
<label>Owner<input id="owner" placeholder="UDS / Maintenance / Survey / E&I"></label>
<label>Priority<select id="priority"><option>High</option><option>Medium</option><option>Low</option></select></label>
<label>Due Date<input id="dueDate" type="date"></label>
<label>Status<select id="status"><option>Open</option><option>In Progress</option><option>Closed</option></select></label>
<button type="button" onclick="saveAction()">Save Action</button>
<button type="button" class="secondary" onclick="exportActions()">Export CSV</button>
<div id="actionList"></div>
</section>

<section id="report" class="tab">
<h2>Daily Report</h2>
<label>Report Date<input id="reportDate" type="date"></label>
<button type="button" onclick="generateReport()">Generate Report</button>
<button type="button" class="secondary" onclick="window.print()">Save as PDF / Print</button>
<button type="button" class="secondary" onclick="exportBackup()">Backup JSON</button>
<div id="reportOutput"></div>
</section>

<section id="settings" class="tab">
<h2>Settings</h2>
<div class="notice"><b>Supabase Status:</b><p id="supabaseStatus"></p></div>
<button type="button" onclick="syncAll()" class="success">Sync Now</button>
<button type="button" onclick="loadCloudCount()" class="secondary">Check Cloud</button>
<button type="button" onclick="exportBackup()" class="secondary">Backup Data</button>
<button type="button" onclick="clearLocalData()" class="danger">Clear Local Data</button>
</section>
</main>

<script src="config.js?v=2.1"></script>
<script src="app.js?v=2.1"></script>
</body>
</html>
